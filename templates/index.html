<!doctype html>
<html lang="en">
  <head>
    <title>Index Page</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="navbar"><div class="navDiv"><p class="logo">Customer Review Analyzer</p></div></div>
    <div class="container">
      <div class="card">
        <div class="txtbox">
          <h1>
            Analyze sentiment, discover trends, and make data-driven decisions
            in seconds.
          </h1>
        </div>
        <form action="/predict" method="post" enctype="multipart/form-data">
          <p>Upload csv file :</p>
          <input type="file" class="inputbox" name="file" accept=".csv" />
          <p>OR</p>
          <p>Enter reviews manually:</p>
          <textarea
            name="manual_reviews"
            class="inputbox"
            placeholder="Enter reviews here..."
          ></textarea>
          <button class="btn" type="submit">Generate Analysis</button>
        </form>
      </div>
    </div>
  </body>
</html>
